# 앞단 Caddy가 넣어준 X-Forwarded-Proto(https) 우선, 없으면 직접 접속 $scheme.
map $http_x_forwarded_proto $fwd_proto {
  default $scheme;
  "~.+"   $http_x_forwarded_proto;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 정적 자산
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # API 프록시 — /v1 → 백엔드 api 컨테이너. SSE를 위해 버퍼링 해제.
  # Docker 내장 DNS(127.0.0.11)로 매 요청 재해석 → api 재시작으로 IP가 바뀌어도 502 안 남.
  location /v1/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:3000;
    proxy_pass $api_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    # 앞단 Caddy가 TLS 종단 → 실제 클라이언트 프로토콜은 Caddy가 넣어준 헤더(https). 없으면 직접 접속의 $scheme.
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding on;
  }

  # 원본 디자인(사용자 제작 30+ 화면) — / 진입 시 legacy로 리다이렉트
  location = / {
    return 302 /legacy/;
  }
  location = /legacy/ {
    try_files /legacy/index.html =404;
  }
  location /legacy/ {
    try_files $uri /legacy/index.html;
  }

  # 관리자 전용 진입 URL — 해시 라우팅(#admin)으로 보냄. 미로그인 시 앱이 로그인 화면으로 가드.
  location = /admin {
    return 302 /legacy/index.html#admin;
  }

  # 기본 폴백 — 원본 디자인(legacy). 제거된 보조 SPA(/app, /src) 흔적은 모두 legacy로.
  location / {
    try_files $uri /legacy/index.html;
  }
}
