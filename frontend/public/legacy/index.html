<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>진로나침반 — 웹 (학생·교사·관리자)</title>
<link rel="stylesheet" href="toss-theme.css"/>
<style>
  html, body, #root { height: 100%; margin: 0; }
  html, body { overflow-x: hidden; max-width: 100%; }
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: var(--font-sans); background: #E9ECEF; }
</style>
</head>
<body>
<script>
  // 실 백엔드 연동 토글 — Vite nginx 서빙에서는 /v1이 백엔드로 프록시됨
  window.__LIVE_MODE = true;
  window.__ROLE_SET = 'web';
  window.VITE_APP_ENV = 'live';          // ENV.USE_REAL_API = true
  window.VITE_API_BASE_URL = '/v1';      // makeApiClient의 baseURL
</script>
<div id="root"></div>

<!-- React / Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Foundations -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>

<!-- Screens (no device frames / design-canvas in live mode) -->
<script type="text/babel" src="public-screens.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<LiveRunner/>);
